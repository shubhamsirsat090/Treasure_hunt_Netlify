<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Treasure Hunt 2K26</title>
    <style>
        body {
            background: radial-gradient(circle at top, #0f172a, #000000);
            color: white;
            font-family: 'Trebuchet MS', sans-serif;
            text-align: center;
            padding: 30px;
        }
        h1 {
            color: #facc15;
        }
        .box {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 15px;
            max-width: 600px;
            margin: auto;
        }
        input {
            padding: 12px;
            margin: 8px;
            width: 85%;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }
        button {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            background: #facc15;
            font-weight: bold;
            cursor: pointer;
        }
        .success { color: #22c55e; font-weight: bold; }
        .error { color: #ef4444; font-weight: bold; }
        .hint {
            margin-top: 15px;
            padding: 15px;
            background: rgba(56,189,248,0.1);
            border-radius: 10px;
            color: #38bdf8;
        }
    </style>
</head>
<body>

<h1>🏴‍☠️ Tech Treasure Hunt 2K26 🏆</h1>
<p>E&TC Department — DVVPCOE</p>

<div class="box">
    <h3 id="locationTitle"></h3>
    <p id="question"></p>

    <input id="team" placeholder="Team Number (01–30)">
    <input id="code" placeholder="Secret Code (e.g., TT2605)">
    <input id="answer" placeholder="Your Answer">

    <br>
    <button onclick="checkAnswer()">Unlock</button>
    <div id="message"></div>
</div>

<script>
const LOCATION_NAMES = {
    start: "Starting Point",
    L1: "Canteen",
    L2: "Parking",
    L3: "Workshop",
    L4: "General Store",
    L5: "Office",
    L6: "Lawn",
    L7: "Kabristan"
};

const ROUTE = ["L1","L2","L3","L4","L5","L6","L7"];

const TEAM_CODES = {
    "01":"TT2601","02":"TT2602","03":"TT2603","04":"TT2604","05":"TT2605",
    "06":"TT2606","07":"TT2607","08":"TT2608","09":"TT2609","10":"TT2610",
    "11":"TT2611","12":"TT2612","13":"TT2613","14":"TT2614","15":"TT2615",
    "16":"TT2616","17":"TT2617","18":"TT2618","19":"TT2619","20":"TT2620",
    "21":"TT2621","22":"TT2622","23":"TT2623","24":"TT2624","25":"TT2625",
    "26":"TT2626","27":"TT2627","28":"TT2628","29":"TT2629","30":"TT2630"
};

const START_PUZZLE = {
    question: "I am always in front of you but can never be seen. What am I?",
    answer: "future"
};

const PUZZLES = {
    L1: {question:"What has keys but no locks, space but no room, and you can enter but can't go inside?",answer:"keyboard"},
    L2: {question:"What runs but never walks, has a mouth but never talks, has a head but never weeps?",answer:"river"},
    L3: {question:"I am always ahead of you in a race but you can never see me or touch me. What am I?",answer:"future"},
    L4: {question:"I speak without a mouth and hear without ears. I have no body but come alive with wind. What am I?",answer:"echo"},
    L5: {question:"I am the one thing you always throw away when you need me and always pick up when you don't. What am I?",answer:"anchor"},
    L6: {question:"A man builds a house with 4 walls. Every wall faces south. A bear walks past. What color is the bear?",answer:"white"},
    L7: {question:"What can you catch but never throw?",answer:"cold"}
};

const HINTS = {
    L1: "Go to the Canteen.",
    L2: "Find the Parking Area.",
    L3: "Head to the Workshop.",
    L4: "Visit the General Store.",
    L5: "Proceed to the Office.",
    L6: "Go to the Lawn.",
    L7: "Final Location: Kabristan."
};

const FIRST_HINT = "Head to the CANTEEN!";

const params = new URLSearchParams(window.location.search);
const loc = params.get("loc") || "start";
const isStart = loc === "start";
const locKey = loc.toUpperCase();

document.getElementById("locationTitle").innerText =
    "📍 " + (LOCATION_NAMES[loc] || LOCATION_NAMES[locKey]);

const puzzle = isStart ? START_PUZZLE : PUZZLES[locKey];
document.getElementById("question").innerText = puzzle.question;

function checkAnswer() {
    const teamRaw = document.getElementById("team").value.trim();
    const team = teamRaw.padStart(2, "0");
    const code = document.getElementById("code").value.replace(/\s+/g,'').toUpperCase();
    const ans = document.getElementById("answer").value.toLowerCase().trim();
    const msg = document.getElementById("message");

    msg.innerHTML = "";

    if (!TEAM_CODES[team] || TEAM_CODES[team] !== code) {
        msg.innerHTML = "<p class='error'>❌ Invalid Team Code!</p>";
        return;
    }

    if (ans !== puzzle.answer) {
        msg.innerHTML = "<p class='error'>❌ Wrong Answer!</p>";
        return;
    }

    let progress = localStorage.getItem("team_" + team);

    if (isStart) {
        localStorage.setItem("team_" + team, ROUTE[0]);
        msg.innerHTML = `<p class='success'>✅ Correct! Hunt Begins!</p>
                         <div class='hint'>${FIRST_HINT}</div>`;
        return;
    }

    if (!progress) {
        msg.innerHTML = "<p class='error'>⚠️ Start from the Starting QR!</p>";
        return;
    }

    if (progress !== locKey) {
        msg.innerHTML = `<p class='error'>⚠️ Wrong Location!</p>
                         <div class='hint'>Go to ${LOCATION_NAMES[progress]}</div>`;
        return;
    }

    const index = ROUTE.indexOf(locKey);

    if (index < ROUTE.length - 1) {
        const next = ROUTE[index + 1];
        localStorage.setItem("team_" + team, next);
        msg.innerHTML = `<p class='success'>✅ Level Cleared!</p>
                         <div class='hint'>${HINTS[next]}</div>`;
    } else {
        localStorage.setItem("team_" + team, "completed");
        msg.innerHTML = `<p class='success'>🏆 TREASURE UNLOCKED! Congratulations!</p>`;
    }
}
</script>

</body>
</html>
